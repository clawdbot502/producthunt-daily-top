name: Product Hunt Daily Top

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  daily:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run daily pipeline
        env:
          PH_TOKEN: ${{ secrets.PH_TOKEN }}
          LARK_APP_ID: ${{ secrets.LARK_APP_ID }}
          LARK_APP_SECRET: ${{ secrets.LARK_APP_SECRET }}
          LARK_CHAT_ID: ${{ secrets.LARK_CHAT_ID }}
          LARK_BASE_APP_TOKEN: ${{ secrets.LARK_BASE_APP_TOKEN }}
          LARK_BASE_TABLE_ID: ${{ secrets.LARK_BASE_TABLE_ID }}
          SUMMARY_API_KEY: ${{ secrets.SUMMARY_API_KEY }}
          SUMMARY_BASE_URL: ${{ secrets.SUMMARY_BASE_URL }}
          SUMMARY_MODEL: ${{ secrets.SUMMARY_MODEL }}
          SUMMARY_FALLBACK_MODELS: ${{ secrets.SUMMARY_FALLBACK_MODELS }}
        run: python main.py
